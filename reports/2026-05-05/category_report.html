<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Category Report</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    margin:0;
    padding:12px;
    font-family: Arial, sans-serif;
    background:#c9edf7;
    color:#000;
    font-size:13px;
  }
  .header {
    background:#d9f4fb;
    border:1px solid #999;
    padding:8px 10px;
    margin-bottom:8px;
  }
  h2 {
    margin:0 0 4px 0;
    font-size:18px;
    color:#00334d;
  }
  .meta {
    font-size:12px;
    color:#333;
  }
  table {
    border-collapse:collapse;
    width:100%;
    background:#c9edf7;
    table-layout:auto;
  }
  th {
    background:#d9f4fb;
    border:1px solid #999;
    padding:5px 8px;
    text-align:center;
    font-weight:bold;
    color:#000;
  }
  td {
    border:1px solid #999;
    padding:4px 8px;
    color:#000;
  }
  .right {
    text-align:right;
    font-family: Arial, sans-serif;
  }
  .left {
    text-align:left;
  }
  .total {
    color:red;
    font-weight:bold;
  }
  .section {
    font-weight:bold;
  }
</style>
</head>
<body>
  <div class="header">
    <h2>Category Report</h2>
    <div class="meta">Business window: 2026-05-05 06:30:00 → 2026-05-06 06:30:00</div>
  </div>
  
<table>
  <thead>
    <tr>
      <th>Group</th>
      <th>Amount</th>
      <th>Amount (Taxes Included)</th>
      <th>Category Count</th>
      <th>Customers</th>
    </tr>
  </thead>
  <tbody>
    <tr><td class='left total'>TOTAL</td><td class='right total'>0.00</td><td class='right total'>0.00</td><td class='right total'>0</td><td class='right total'>0</td></tr>
  </tbody>
</table>

</body>
</html>
